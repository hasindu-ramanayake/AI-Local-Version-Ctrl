name: Release Standalone Binaries

on:
  release:
    types: [created]

jobs:
  build:
    name: Build on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]

    steps:
      - name: Checkout source code
        uses: actions/checkout@v3

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install .
          pip install pyinstaller

      - name: Build Standalone Binary with PyInstaller
        run: |
          pyinstaller --name ai-cl --onefile src/cli.py

      - name: Rename Binary for OS (Linux/Mac)
        if: matrix.os != 'windows-latest'
        run: |
          mv dist/ai-cl dist/ai-cl-${{ runner.os }}

      - name: Rename Binary for OS (Windows)
        if: matrix.os == 'windows-latest'
        run: |
          ren dist\ai-cl.exe ai-cl-${{ runner.os }}.exe
        shell: cmd

      - name: Upload Release Asset (Windows)
        if: matrix.os == 'windows-latest'
        uses: softprops/action-gh-release@v1
        with:
          files: dist/ai-cl-*.exe
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload Release Asset (Linux/Mac)
        if: matrix.os != 'windows-latest'
        uses: softprops/action-gh-release@v1
        with:
          files: dist/ai-cl-*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
